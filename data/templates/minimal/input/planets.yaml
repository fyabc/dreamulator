# Planets for the minimal template
planets:
  - id: "planet_terra"
    name: "Terra"
    orbits: "star_sol"
    planet_type: "terrestrial"
    mass: 1.0
    radius: 1.0
    rotation_period_days: 1.0
    axial_tilt_deg: 23.4
    albedo: 0.3
    atmosphere:
      surface_pressure_atm: 1.0
      composition:
        N2: 0.78
        O2: 0.21
        Ar: 0.01
      greenhouse_factor: 33.0
    hydrosphere:
      water_coverage: 0.71
      salinity_ppt: 35.0
      ocean_depth_km: 3.7
    lithosphere:
      has_plate_tectonics: true
      num_plates: 15
      volcanic_activity: 1.0
