# L4 伴星分支的文明种子
#
# 伴星（木星亮度的点光源，永远锁定在月球前方六分之一圆周处）深刻塑造了
# 人类的宇宙观、哲学与文化。
#
# 驱动文化分化的核心物理事实：
# - 伴星是点光源（~13角秒），肉眼不可分辨圆面
# - 满相亮度：V ~ -2.5（与木星相当）
# - 永远领先月亮六分之一圆周（两个星宫）
# - 满相比月亮早约4.9天
# - 公转周期与月球相同（~27.3天恒星月）
# - 不构成对地心说的挑战（与月球一样绕地球公转）

civilizations:
  # --- 三才宇宙观文明 ---
  # 以东亚文化传统为原型，围绕"日-月-伴星"三元结构构建世界观。
  - id: civ_triadic
    name: 三才文明
    description: >
      一个以哲学思辨为核心的文明。该文明认为宇宙由三才平衡所主宰：
      太阳（阳/昼/父）、月亮（阴/夜/母）、伴星（中和/变数/子）。
      伴星永远领先月亮60度（约两个星宫），被解读为"先兆"的宇宙法则——
      一切变化皆有先声，未至全盛便已显露端倪。

      核心信仰：
      - 三才之道：天（太阳）、地（月亮）、人（伴星）。伴星代表打破二元
        僵局的"第三力"，催生动态均衡——"道生一，一生二，二生三，三生万物"
      - 数字崇拜：3与6为神圣之数。3对应三才（日、月、星），
        6对应伴星领先月亮的六分之一圆周。建筑采用等边三角形与
        正六边形几何布局，社会制度偏重三进制与六进制的分组结构
      - 三级历法：太阳定年（四季更替），月亮定月（朔望盈缺），
        伴星定候（5日一候）。伴星满相为先导，5日后月亮必圆，
        构成精确的"年-月-候"三级时间体系
      - 双节制度："迎月节"（伴星满相）与"正月圆节"（月亮满相），
        两节相隔5日，其间为备祭与期待的时段
      - "双月难同圆"哲学：伴星与月亮永远无法同时达到满相，
        被引申为"世间万物终难圆满"的深层隐喻，形容错过的爱情、
        得失相伴的命运，以及追求本身比抵达更美的人生境界
    tags: [三才, 哲学, 历法]

  # --- 航海/游牧文明 ---
  - id: civ_wayfinder
    name: 引路者文明
    description: >
      一个以航海和游牧为生的文明，将伴星视为实用的导航工具和计时器，
      而非哲学象征。

      核心信仰：
      - 伴星是"月亮的猎犬"——忠诚的斥候，永远奔跑在主人前方六分之一
        圆周处，在群星间探路
      - 航海家利用伴星与月亮之间固定的六分之一圆周角距作为天文校准
        工具，使经度测定技术比基线历史提前数个世纪
      - 牧民和农夫在黄昏时观察伴星相对地平线的位置：当伴星过中天时，
        5日后必为满月（大潮），据此安排迁徙与农事
      - 史诗中歌颂伴星为勇敢的引路者、照亮前路的"持炬人"
    tags: [航海, 实用, 游牧]

  # --- 二元正统文明 ---
  - id: civ_dualist
    name: 二元正统文明
    description: >
      一个神权至上的文明，否认伴星的合法性，视其为篡位者或伪月。

      核心信仰：
      - "天无二日，月无二主"教义：伴星是攀附月球轨道的妖邪，
        窃取月亮的神光
      - 伴星领先月亮六分之一圆周的偏移被解读为"六重欺瞒"——
        数字6在此文化中带有不祥的含义
      - 祭司将伴星位置的任何摄动（天平动效应）解读为谋反、
        异端或王朝崩溃的凶兆
      - 当伴星被行星掩食（极为罕见）时，被宣布为"伪先锋陨落"——
        末世的重大凶兆，需举行净化仪式
      - 吊诡的是，该文明的天文学家反而是最细致的伴星观测者，
        因为追踪其"奸行"是神圣职责
    tags: [二元论, 神权, 对立]

  # --- 潮汐农耕文明 ---
  - id: civ_tidal
    name: 潮汐农耕文明
    description: >
      一个河谷与沿海文明，将伴星与水、洪涝和丰饶联系在一起。

      核心信仰：
      - 伴星是"潮汐之眼"或"水龙"——与月亮共同牵引江河湖海的神灵
      - 伴星满相比月亮早5天，成为大潮和季节性洪水的天然预警系统。
        农民依伴星周期安排播种与收获
      - 伴星被描绘为游弋于天河之中的蛇或龙，其明亮光芒是月光在
        鳞片上的闪烁
      - 水利工程提前发展：该文明建造堤坝、运河和灌溉系统，
        均按月亮-伴星双重潮汐周期校准
      - 神话：伴星与月亮是水神的两个化身——伴星是水神的"远视之眼"，
        警示凡人；月亮是水神的"满月之面"，号令万水
    tags: [农耕, 潮汐, 水利]
