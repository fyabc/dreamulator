[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "conlang"
version = "0.1.0"
description = "Conlang (constructed language) toolkit: ASCIIPA, SCA, morphology, and lexicon"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "mypy>=1.14",
    "ruff>=0.9",
]
tts = ["py-espeak-ng>=0.1"]

[project.scripts]
conlang = "conlang.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/conlang"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"
