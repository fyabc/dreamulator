# 瓦克里克语（Vha'Klik）高阶语词汇表
# Highland Vha'Klik Lexicon
#
# 用于 SCA 音变推演：输入原始高原语词汇 → 输出平原方言（Vha'Kli）

# === 基础词汇 ===
- "|a:55"          # 气 / 灵魂 (Vha)
- "!i:55"          # 神圣
- "||o"            # 大地
- "=!i"            # 天空

# === 家庭词汇 ===
- "<a"             # 母亲
- "<d e:55"        # 父亲
- "<g u"           # 力量
- "<j a"           # 生命

# === 自然词汇 ===
- "!o.!i"          # 星辰
- "||a.||e"        # 山峦

# === 宗教词汇 ===
- "|a.|e.!i"       # 吸气祈祷
- "!a:55.!a:55.!a:55"  # 三连圣颂

# === 战士词汇 ===
- "p'a"            # 守护
- "t'o"            # 决断
- "k'u"            # 力量爆发
- "s'a"            # 战吼
- "{ch'}i"         # 斩击

# === 禁忌词汇（低阶语 · 含肺部气流音）===
- "fu"             # 风（泄魂之音）
- "ha"             # 死亡（濒死喘息）
- "sa"             # 虚弱
- "ma"             # 哭泣
